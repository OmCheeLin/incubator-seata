name: Detect flaky Test

on:
  workflow_run:
    workflows: ["Rerun build"]
    types:
      - completed

permissions:
  issues: write

jobs:
  detect-flaky:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.run_attempt == 2
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 8, 17, 21 ]
    steps:
      # step 1
      - name: "Download test reports artifact for run 1"
        uses: actions/download-artifact@v3
        with:
          name: run-1-surefire-reports-${{ matrix.java }}
          path: reports-1-${{ matrix.java }}
      # step 2
      - name: "Download test reports artifact for run 2"
        uses: actions/download-artifact@v3
        with:
          name: run-2-surefire-reports-${{ matrix.java }}
          path: reports-2-${{ matrix.java }}
      # step 3
      - name: "Use Python 3.x"
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'
      # step 4
      - name: Parse failed tests
        id: parse_failed_tests
        run: |
          output=$(python3 .github/workflows/parse_failed_tests.py reports-1-${{ matrix.java }} reports-2-${{ matrix.java }})
          echo "::set-output name=flaky_tests::$output"
      - name: Create GitHub issue for flaky tests
        if: steps.parse_failed_tests.outputs.flaky_tests != '[]'
        uses: actions/github-script@v6
        with:
          script: |
            const flakyTests = JSON.parse(process.env.FLAKY_TESTS);
            const body = `Detected flaky tests in Java ${{ matrix.java }} run:\n\n` +
              flakyTests.map(t => `- ${t}`).join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Flaky tests detected for Java ${{ matrix.java }}`,
              body: body,
            });
          env:
            FLAKY_TESTS: ${{ steps.parse_failed_tests.outputs.flaky_tests }}
